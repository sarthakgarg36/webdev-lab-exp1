<!DOCTYPE html>
<html>
<head>
    <title>sarthakgarg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #c3ecf7, #f5c6ec);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .wrapper {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px 30px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 28px;
            color: #2c3e66;
            margin-bottom: 8px;
        }

        .sub {
            color: #5a6e8a;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .exp-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
        }

        .exp-card {
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .exp-card:hover {
            transform: translateY(-3px);
            background: #e8d4f0;
        }

        a {
            text-decoration: none;
            color: #2c3e66;
            font-weight: 600;
            font-size: 16px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.1);
            font-size: 13px;
            color: #5a4a6e;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>💻 Web Designing Lab File</h1>
    <div class="sub">Homepage</div>

    <div class="exp-list">
        <div class="exp-card">
            <a href="./index.html">Experiment 1</a>
        </div>
    </div>

    <div class="exp-list">
        <div class="exp-card">
            <a href="./Experiment_2/index.html">Experiment 2</a>
        </div>
    </div>

    <div class="exp-list">
        <div class="exp-card">
            <a href="./Experiment_3/index.html">Experiment 3</a>
        </div>
    </div>

    <div class="footer">
        Made by: Sarthak Garg (J240213061)
    </div>
</div>

</body>
</html>
