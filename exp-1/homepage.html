<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sarthak Garg | Web Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a24;
            --card: #14141e;
            --border: #2a2a3a;
            --accent: #7c6ef7;
            --accent2: #a78bfa;
            --text: #e8e8f0;
            --muted: #7070a0;
            --dim: #3a3a55;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 700px 500px at 70% 30%, rgba(124, 110, 247, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 20% 70%, rgba(124, 110, 247, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrapper {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 44px 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-tag {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--accent);
            background: rgba(124, 110, 247, 0.1);
            border: 1px solid rgba(124, 110, 247, 0.25);
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        h1 span {
            color: var(--accent);
        }

        .sub {
            font-family: 'Fira Code', monospace;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 40px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 36px;
        }

        .exp-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .exp-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
            text-decoration: none;
        }

        .exp-card:hover {
            border-color: var(--accent);
            background: rgba(124, 110, 247, 0.07);
            transform: translateX(4px);
        }

        .exp-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .exp-num {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--accent);
            background: rgba(124, 110, 247, 0.12);
            border: 1px solid rgba(124, 110, 247, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .exp-name {
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
        }

        .exp-arrow {
            color: var(--dim);
            font-size: 18px;
            transition: color 0.2s, transform 0.2s;
        }

        .exp-card:hover .exp-arrow {
            color: var(--accent2);
            transform: translateX(3px);
        }

        .footer {
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
            font-family: 'Fira Code', monospace;
        }

        .footer span {
            color: var(--accent2);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="logo-tag">index.html</div>
    <h1>Web <span>Designing</span> Lab</h1>
    <p class="sub">Homepage</p>

    <div class="divider"></div>

    <div class="exp-list">
        <a href="./index.html" class="exp-card">
            <div class="exp-left">
                <span class="exp-num">01</span>
                <span class="exp-name">Experiment 1</span>
            </div>
            <span class="exp-arrow">→</span>
        </a>

        <a href="./exp-2/index.html" class="exp-card">
            <div class="exp-left">
                <span class="exp-num">02</span>
                <span class="exp-name">Experiment 2</span>
            </div>
            <span class="exp-arrow">→</span>
        </a>

        <a href="./exp-3/index.html" class="exp-card">
            <div class="exp-left">
                <span class="exp-num">03</span>
                <span class="exp-name">Experiment 3</span>
            </div>
            <span class="exp-arrow">→</span>
        </a>
         <a href="./exp-4/index.html" class="exp-card">
            <div class="exp-left">
                <span class="exp-num">04</span>
                <span class="exp-name">Experiment 4</span>
            </div>
            <span class="exp-arrow">→</span>
        </a>
        <a href="./exp-5/index.html" class="exp-card">
            <div class="exp-left">
                <span class="exp-num">05</span>
                <span class="exp-name">Experiment 5</span>
            </div>
            <span class="exp-arrow">→</span>
        </a>
        <a href="./exp-6/index.html" class="exp-card">
            <div class="exp-left">
                <span class="exp-num">06</span>
                <span class="exp-name">Experiment 6</span>
            </div>
            <span class="exp-arrow">→</span>
        </a>
    </div>

    <div class="footer">
        Made by: <span>Sarthak Garg</span> &nbsp;·&nbsp; J240213061
    </div>
</div>

</body>
</html>
