<!DOCTYPE html>
<html>
<head>
    <title>Experiment 1</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #c3ecf7, #f5c6ec);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 350px;
        }

        h1 {
            margin-bottom: 15px;
            color: #2c3e66;
            font-size: 28px;
        }

        p {
            color: #5a6e8a;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #b374b0;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            background: #9a5a97;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Experiment 1</h1>
    <p>This is my first web designing experiment.</p>
    <a href="./homepage.html" class="btn">← Back to Home</a>
</div>

</body>
</html>
